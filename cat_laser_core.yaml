esphome:
  name: cat-laser-toy
  friendly_name: Cat Laser Toy

esp32:
  board: m5stack-core-esp32
  framework:
    type: arduino

logger:
  level: DEBUG
api:
ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

i2c:
  sda: 21
  scl: 22
  scan: true

external_components:
  - source: github://alvinchen1/m5stack-goplus2
    components: [goplus2]

goplus2:
  id: goplus2_main
  address: 0x38

output:
  - platform: goplus2
    id: pan_output
    goplus2_id: goplus2_main
    channel: 0

  - platform: goplus2
    id: tilt_output
    goplus2_id: goplus2_main
    channel: 1

servo:
  - id: pan_servo
    output: pan_output
    min_level: 0.0
    max_level: 1.0

  - id: tilt_servo
    output: tilt_output
    min_level: 0.0
    max_level: 1.0

switch:
  - platform: gpio
    id: laser
    pin: 26
    inverted: false

script:
  - id: random_laser_motion
    mode: restart
    then:
      - switch.turn_on: laser
      - repeat:
          count: 50
          then:
            - servo.write:
                id: pan_servo
                level: !lambda "return random_float();"
            - servo.write:
                id: tilt_servo
                level: !lambda "return random_float();"
            - delay: 300ms
      - switch.turn_off: laser

button:
  - platform: template
    name: "Start Cat Laser"
    on_press:
      - script.execute: random_laser_motion
